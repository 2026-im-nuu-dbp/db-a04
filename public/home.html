<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>個人主頁</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .container {
            max-width: 400px;
            margin: 60px auto;
            background: #fff;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
        }

        input,
        select,
        textarea,
        button {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #388E3C;
        }

        .link {
            text-align: right;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <header style="display: flex; justify-content: space-between; align-items: center; margin-top: 40px;">
        <h1 id="nickname" style="margin: 0 auto;">你好，使用者！</h1>
        <a href="log.php" style="margin-left: auto; text-decoration: none; color: #4CAF50; font-size: 16px;">登入紀錄</a>
    </header>
    <div class="container">
        <button onclick="location.href='add_memo.html'">新增圖文記事</button>
        <div id="memo-list" style="margin-top:24px;"></div>
    </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 取得暱稱
            fetch('get_nickname.php')
                .then(res => res.json())
                .then(data => {
                    if (data.nickname) {
                        document.getElementById('nickname').textContent = '你好，' + data.nickname + '！';
                    }
                });

            // 取得記事列表
            fetch('get_memo.php')
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('memo-list');
                    if (data.error) {
                        list.innerHTML = '<div style="color:red">' + data.error + '</div>';
                        return;
                    }
                    if (data.length === 0) {
                        list.innerHTML = '<div style="color:#888">尚無記事</div>';
                        return;
                    }
                    list.innerHTML = data.map((memo, idx) =>
                        `<div style="border-bottom:1px solid #eee; padding:8px 0; position:relative;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-weight:bold;">${memo.title || '(無標題)'}</div>
                        <div class="memo-menu-btn" style="cursor:pointer; font-size:22px; padding:0 8px; user-select:none;" data-idx="${idx}">···</div>
                    </div>
                    <div class="memo-menu" id="memo-menu-${idx}" style="display:none; position:absolute; right:8px; top:32px; background:#fff; border:1px solid #ccc; border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,0.08); z-index:10; min-width:80px;">
                        <button onclick="editMemo(${memo.id}, '${encodeURIComponent(memo.title || '')}', '${encodeURIComponent(memo.content || '')}')" style="width:100%;border:none;background:none;padding:8px;cursor:pointer;text-align:left;color:#000000;">編輯</button>
                        <button onclick="deleteMemo(${memo.id})" style="width:100%;border:none;background:none;padding:8px;cursor:pointer;text-align:left;color:#d32f2f;">刪除</button>
                    </div>
                    ${memo.image_path ? `<img src="${memo.image_path}" style="max-width:100%;margin:8px 0;">` : ''}
                    <div style="white-space:pre-line; color:#333; margin:4px 0;">${memo.content || ''}</div>
                    <div style="font-size:12px; color:#888;">${memo.created_at || ''}</div>
                </div>`
                    ).join('');
                    // menu toggle
                    document.querySelectorAll('.memo-menu-btn').forEach(btn => {
                        btn.addEventListener('click', function (e) {
                            e.stopPropagation();
                            const idx = btn.getAttribute('data-idx');
                            const menu = document.getElementById('memo-menu-' + idx);
                            document.querySelectorAll('.memo-menu').forEach(m => { if (m !== menu) m.style.display = 'none'; });
                            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
                        });
                    });
                    document.addEventListener('click', function () {
                        document.querySelectorAll('.memo-menu').forEach(m => m.style.display = 'none');
                    });
                })
                .catch(() => {
                    document.getElementById('memo-list').innerHTML = '<div style="color:red">無法取得記事</div>';
                });
        });

        function editMemo(id, title, content) {
            title = decodeURIComponent(title);
            content = decodeURIComponent(content);
            const newTitle = prompt('請輸入新標題：', title);
            if (newTitle === null) return;
            const newContent = prompt('請輸入新內容：', content);
            if (newContent === null) return;
            fetch('alter_memo.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `action=edit&id=${id}&title=${encodeURIComponent(newTitle)}&content=${encodeURIComponent(newContent)}`
            })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        alert('修改成功');
                        location.reload();
                    } else {
                        alert(JSON.stringify(res));
                    }
                });
        }
        function deleteMemo(id) {
            if (confirm('確定要刪除這則記事嗎？')) {
                fetch('alter_memo.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `action=delete&id=${id}`
                })
                    .then(res => res.json())
                    .then(res => {
                        if (res.success) {
                            alert('刪除成功');
                            location.reload();
                        } else {
                            alert(JSON.stringify(res));
                        }
                    });
            }
        }
    </script>
</body>

</html>
